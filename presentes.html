<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Chá de Panela</title>
    <meta name="description" content="Lista de presentes do chá de panela da Emily. Escolha um presente especial para celebrar esse momento!">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Pequeno ajuste para a barra de navegação no topo de presentes.html */
        .page-header {
            padding: 20px 20px 0;
            background: var(--color-bg);
            max-width: 1100px;
            margin: 0 auto;
        }
        .page-header a {
            color: var(--color-text-medium);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .page-header a:hover {
            color: var(--color-primary-dark);
        }
        .gift-section {
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <header class="page-header">
        <a href="index.html">← Voltar para o Início</a>
    </header>

    <!-- ============ LISTA DE PRESENTES ============ -->
    <section id="presentes" class="gift-section">
        <div class="container">
            <h2 class="section-title">Lista de Presentes</h2>

            <div class="progress-container">
                <p class="progress-text" id="progress-text">Carregando...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="todos">Todos</button>
                <button class="filter-btn" data-filter="disponiveis">Disponíveis</button>
                <button class="filter-btn" data-filter="escolhidos">Escolhidos</button>
            </div>

            <div id="gift-grid" class="gift-grid">
                <!-- Cards renderizados pelo JS -->
            </div>
        </div>
    </section>

    <!-- ============ MODAL DE SELEÇÃO ============ -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <img class="modal-img" id="modal-img" src="" alt="">
            <h3 id="modal-nome"></h3>
            <div class="modal-form">
                <label for="nome-convidado">Qual é o seu nome?</label>
                <input type="text" id="nome-convidado" placeholder="Digite seu nome completo" maxlength="60">
                <p class="error-msg" id="error-msg"></p>
            </div>
            <div class="modal-actions">
                <button id="btn-confirmar" class="btn-primary">🎉 Confirmar Presente</button>
                <button id="btn-voltar" class="btn-secondary">Voltar</button>
            </div>
        </div>
    </div>

    <!-- ============ TOAST DE SUCESSO ============ -->
    <div id="toast" class="toast">
        <p>Oba! Você escolheu esse presente 🎉</p>
    </div>

    <!-- ============ CONFETTI ============ -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ============ FIREBASE SDK ============ -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
